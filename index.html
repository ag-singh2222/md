<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Gallery</title>
  <link rel="shortcut icon" href="photo/we2.png"  type="image/x-icon">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4, #fbc2eb, #a6c1ee);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    h1 {
      text-align: center;
      padding: 25px;
      color: #ef3106;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.3);
      font-size: 2.5em;
      border-radius: 20px;
    }
     a {
      text-align: center;
      padding: 25px;
      color: #fff;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.3);
      font-size: 2.5em;
      border-radius: 20px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 20px rgba(0,0,0,0.3);
    }

    .card img {
      width: 100%;
      height: auto;
      display: block;
    }

    .caption {
      padding: 15px;
      text-align: center;
      font-weight: bold;
      color: #333;
    }
    .button{
        border-radius: 20px;
    }
   
  </style>
</head>
<body>
  <h1>🌈 Our Love Gallery</h1>
  <div class="gallery">
    <div class="card">
      <img src="photo/we2.png" alt="Image 1">
      <div class="caption">we are ....</div>
    </div>
    <div class="card">
      <img src="photo/we.png" alt="Image 2">
      <div class="caption">Our Love</div>
    </div>
    <div class="card">
      <img src="photo/you2.png" alt="Image 3">
      <div class="caption"> For You</div>
    </div>
  </div>

<h1 ><button><a href="About.html">For You</a></button> </h1>

</body>
</html>
